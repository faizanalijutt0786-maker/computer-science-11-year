<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360" font-family="Arial, sans-serif">
  <rect width="440" height="360" fill="#f8faff" rx="12"/>
  <text x="220" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 4.5: Undirected Graph</text>
  <text x="220" y="46" text-anchor="middle" font-size="11" fill="#555">Edges have no direction — connections work both ways</text>

  <!-- Nodes -->
  <circle cx="110" cy="130" r="30" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="110" y="135" text-anchor="middle" font-size="16" fill="white" font-weight="bold">A</text>

  <circle cx="270" cy="100" r="30" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="270" y="105" text-anchor="middle" font-size="16" fill="white" font-weight="bold">B</text>

  <circle cx="370" cy="200" r="30" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="370" y="205" text-anchor="middle" font-size="16" fill="white" font-weight="bold">C</text>

  <circle cx="270" cy="280" r="30" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="270" y="285" text-anchor="middle" font-size="16" fill="white" font-weight="bold">D</text>

  <circle cx="110" cy="260" r="30" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="110" y="265" text-anchor="middle" font-size="16" fill="white" font-weight="bold">E</text>

  <!-- Undirected edges (plain lines, no arrows) -->
  <line x1="138" y1="118" x2="241" y2="107" stroke="#388E3C" stroke-width="2.5"/>
  <line x1="298" y1="116" x2="344" y2="178" stroke="#388E3C" stroke-width="2.5"/>
  <line x1="354" y1="226" x2="294" y2="258" stroke="#388E3C" stroke-width="2.5"/>
  <line x1="241" y1="280" x2="139" y2="268" stroke="#388E3C" stroke-width="2.5"/>
  <line x1="110" y1="230" x2="110" y2="160" stroke="#388E3C" stroke-width="2.5"/>
  <line x1="136" y1="147" x2="245" y2="268" stroke="#388E3C" stroke-width="2.5"/>
  <line x1="138" y1="252" x2="244" y2="120" stroke="#388E3C" stroke-width="2.5"/>

  <!-- Bidirectional labels on one edge to illustrate -->
  <text x="183" y="108" text-anchor="middle" font-size="10" fill="#1b5e20">friends</text>
  <text x="155" y="155" font-size="10" fill="#888">↕</text>

  <!-- Friendship labels -->
  <text x="110" y="310" text-anchor="middle" font-size="11" fill="#2e7d32">Person A</text>
  <text x="270" y="50" text-anchor="middle" font-size="11" fill="#2e7d32">Person B</text>
  <text x="410" y="205" text-anchor="middle" font-size="11" fill="#2e7d32">Person C</text>
  <text x="270" y="330" text-anchor="middle" font-size="11" fill="#2e7d32">Person D</text>
  <text x="60" y="265" text-anchor="middle" font-size="11" fill="#2e7d32">Person E</text>

  <!-- Legend -->
  <line x1="30" y1="345" x2="80" y2="345" stroke="#388E3C" stroke-width="2.5"/>
  <text x="90" y="349" font-size="11" fill="#333">Undirected edge — connection works both ways (A↔B = B↔A)</text>
</svg>
