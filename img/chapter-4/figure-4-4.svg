<svg xmlns="http://www.w3.org/2000/svg" width="460" height="380" viewBox="0 0 460 380" font-family="Arial, sans-serif">
  <rect width="460" height="380" fill="#f8faff" rx="12"/>
  <text x="230" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 4.4: Directed Weighted Graph</text>
  <text x="230" y="46" text-anchor="middle" font-size="11" fill="#555">Edges have direction (arrows) and weight (distance/cost)</text>

  <defs>
    <marker id="dwa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Nodes -->
  <circle cx="100" cy="150" r="30" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="100" y="155" text-anchor="middle" font-size="16" fill="white" font-weight="bold">A</text>

  <circle cx="260" cy="100" r="30" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="260" y="105" text-anchor="middle" font-size="16" fill="white" font-weight="bold">B</text>

  <circle cx="380" cy="150" r="30" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="380" y="155" text-anchor="middle" font-size="16" fill="white" font-weight="bold">C</text>

  <circle cx="260" cy="260" r="30" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="260" y="265" text-anchor="middle" font-size="16" fill="white" font-weight="bold">D</text>

  <circle cx="140" cy="280" r="30" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="140" y="285" text-anchor="middle" font-size="16" fill="white" font-weight="bold">E</text>

  <!-- Directed edges -->
  <!-- A -> B -->
  <line x1="128" y1="135" x2="232" y2="108" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="162" y="108" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="175" y="121" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">10</text>

  <!-- B -> C -->
  <line x1="290" y1="108" x2="350" y2="132" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="308" y="108" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="321" y="121" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">20</text>

  <!-- A -> D -->
  <line x1="118" y1="174" x2="228" y2="244" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="148" y="205" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="161" y="218" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">12</text>

  <!-- C -> D -->
  <line x1="360" y1="175" x2="285" y2="237" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="320" y="196" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="333" y="209" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">8</text>

  <!-- D -> E -->
  <line x1="230" y1="265" x2="170" y2="272" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="193" y="258" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="206" y="271" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">32</text>

  <!-- E -> A -->
  <line x1="115" y1="257" x2="105" y2="180" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="72" y="214" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="85" y="227" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">60</text>

  <!-- B -> D -->
  <line x1="256" y1="130" x2="256" y2="230" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <rect x="230" y="175" width="26" height="18" fill="#fff8e1" rx="3"/>
  <text x="243" y="188" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">4</text>

  <!-- Legend -->
  <line x1="30" y1="345" x2="80" y2="345" stroke="#c62828" stroke-width="2" marker-end="url(#dwa)"/>
  <text x="90" y="349" font-size="11" fill="#333">Directed edge (one-way)</text>
  <rect x="220" y="338" width="20" height="14" fill="#fff8e1" stroke="#e65100" stroke-width="1" rx="2"/>
  <text x="230" y="349" text-anchor="middle" font-size="10" fill="#e65100">15</text>
  <text x="246" y="349" font-size="11" fill="#333"> Weight (cost/distance)</text>
</svg>
