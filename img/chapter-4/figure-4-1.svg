<svg xmlns="http://www.w3.org/2000/svg" width="380" height="420" viewBox="0 0 380 420" font-family="Arial, sans-serif">
  <rect width="380" height="420" fill="#f8faff" rx="12"/>
  <text x="190" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 4.1: Stack of Books (LIFO)</text>

  <!-- Stack container outline -->
  <rect x="100" y="55" width="180" height="290" rx="6" fill="none" stroke="#90A4AE" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="190" y="365" text-anchor="middle" font-size="11" fill="#607D8B">Stack container</text>

  <!-- TOP label -->
  <text x="310" y="100" font-size="12" fill="#c62828" font-weight="bold">← TOP</text>

  <!-- Books stacked bottom to top -->
  <!-- Book 1 (bottom) -->
  <rect x="110" y="295" width="160" height="42" rx="4" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="190" y="321" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Book A</text>
  <text x="70" y="318" text-anchor="middle" font-size="10" fill="#888">Push 1st</text>

  <!-- Book 2 -->
  <rect x="110" y="245" width="160" height="42" rx="4" fill="#1976D2" stroke="#1565c0" stroke-width="2"/>
  <text x="190" y="271" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Book B</text>
  <text x="70" y="268" text-anchor="middle" font-size="10" fill="#888">Push 2nd</text>

  <!-- Book 3 -->
  <rect x="110" y="195" width="160" height="42" rx="4" fill="#42A5F5" stroke="#1976D2" stroke-width="2"/>
  <text x="190" y="221" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Book C</text>
  <text x="70" y="218" text-anchor="middle" font-size="10" fill="#888">Push 3rd</text>

  <!-- Book 4 (top) -->
  <rect x="110" y="145" width="160" height="42" rx="4" fill="#90CAF9" stroke="#42A5F5" stroke-width="2"/>
  <text x="190" y="171" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">Book D</text>
  <text x="70" y="168" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Push 4th ←</text>

  <!-- Pop arrow -->
  <defs>
    <marker id="pa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
  </defs>
  <line x1="270" y1="166" x2="320" y2="120" stroke="#c62828" stroke-width="2" marker-end="url(#pa)" stroke-dasharray="5,3"/>
  <text x="325" y="115" font-size="11" fill="#c62828" font-weight="bold">POP</text>
  <text x="325" y="130" font-size="10" fill="#c62828">(first out)</text>

  <!-- LIFO explanation -->
  <rect x="60" y="385" width="260" height="28" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="190" y="403" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">LIFO: Last Book In = First Book Out</text>
</svg>
