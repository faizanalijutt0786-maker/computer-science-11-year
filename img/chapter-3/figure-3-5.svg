<svg xmlns="http://www.w3.org/2000/svg" width="480" height="400" viewBox="0 0 480 400" font-family="Arial, sans-serif">
  <rect width="480" height="400" fill="#f8faff" rx="12"/>
  <text x="240" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 3.5: Growth of Asymptotic Notations (Big O)</text>

  <!-- Axes -->
  <line x1="60" y1="330" x2="440" y2="330" stroke="#333" stroke-width="2" marker-end="url(#axarr)"/>
  <line x1="60" y1="330" x2="60" y2="50" stroke="#333" stroke-width="2" marker-end="url(#axarr)"/>
  <text x="450" y="335" font-size="13" fill="#333">n</text>
  <text x="40" y="45" font-size="13" fill="#333">T(n)</text>
  <text x="240" y="360" text-anchor="middle" font-size="12" fill="#555">Input Size (n)</text>
  <text x="20" y="200" font-size="12" fill="#555" transform="rotate(-90 20 200)">Time</text>

  <!-- Grid lines -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="60" y1="280" x2="440" y2="280"/>
    <line x1="60" y1="230" x2="440" y2="230"/>
    <line x1="60" y1="180" x2="440" y2="180"/>
    <line x1="60" y1="130" x2="440" y2="130"/>
    <line x1="60" y1="80" x2="440" y2="80"/>
    <line x1="140" y1="50" x2="140" y2="330"/>
    <line x1="220" y1="50" x2="220" y2="330"/>
    <line x1="300" y1="50" x2="300" y2="330"/>
    <line x1="380" y1="50" x2="380" y2="330"/>
  </g>

  <!-- O(1) — flat line -->
  <polyline points="60,310 440,310" stroke="#4CAF50" stroke-width="2.5" fill="none"/>
  <!-- O(log n) -->
  <polyline points="60,310 100,285 140,270 180,260 220,252 260,246 300,242 340,238 380,235 420,233" stroke="#2196F3" stroke-width="2.5" fill="none"/>
  <!-- O(n) — linear -->
  <polyline points="60,310 140,272 220,234 300,196 380,158 440,127" stroke="#FF9800" stroke-width="2.5" fill="none"/>
  <!-- O(n log n) -->
  <polyline points="60,310 120,260 180,215 240,175 300,138 350,108 390,85 420,70" stroke="#9C27B0" stroke-width="2.5" fill="none"/>
  <!-- O(n²) — quadratic -->
  <polyline points="60,310 100,295 140,268 180,228 220,178 260,118 290,72" stroke="#f44336" stroke-width="2.5" fill="none"/>

  <!-- Labels -->
  <text x="445" y="313" font-size="11" fill="#4CAF50" font-weight="bold">O(1)</text>
  <text x="425" y="237" font-size="11" fill="#2196F3" font-weight="bold">O(log n)</text>
  <text x="445" y="130" font-size="11" fill="#FF9800" font-weight="bold">O(n)</text>
  <text x="390" y="65" font-size="11" fill="#9C27B0" font-weight="bold">O(n log n)</text>
  <text x="272" y="65" font-size="11" fill="#f44336" font-weight="bold">O(n²)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="axarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="60" y="370" width="10" height="10" fill="#4CAF50"/>
  <text x="74" y="380" font-size="10" fill="#333">O(1) Constant</text>
  <rect x="155" y="370" width="10" height="10" fill="#2196F3"/>
  <text x="169" y="380" font-size="10" fill="#333">O(log n)</text>
  <rect x="230" y="370" width="10" height="10" fill="#FF9800"/>
  <text x="244" y="380" font-size="10" fill="#333">O(n) Linear</text>
  <rect x="315" y="370" width="10" height="10" fill="#9C27B0"/>
  <text x="329" y="380" font-size="10" fill="#333">O(n log n)</text>
  <rect x="405" y="370" width="10" height="10" fill="#f44336"/>
  <text x="419" y="380" font-size="10" fill="#333">O(n²)</text>
</svg>
