<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" font-family="Arial, sans-serif">
  <rect width="520" height="320" fill="#f8faff" rx="12"/>
  <text x="260" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 7.2: Security Threats and Prevention Techniques</text>

  <!-- Column headers -->
  <rect x="30" y="42" width="210" height="26" fill="#c62828" rx="5"/>
  <text x="135" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Security Threat</text>
  <rect x="280" y="42" width="210" height="26" fill="#1565c0" rx="5"/>
  <text x="385" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Prevention Technique</text>

  <!-- Arrow between columns -->
  <text x="255" y="59" text-anchor="middle" font-size="16" fill="#555">→</text>

  <!-- Row 1: Spam -->
  <rect x="30" y="76" width="210" height="40" fill="#FFEBEE" rx="4" stroke="#c62828" stroke-width="1"/>
  <text x="135" y="92" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Spam</text>
  <text x="135" y="108" text-anchor="middle" font-size="9" fill="#555">Unwanted emails/messages</text>
  <text x="255" y="98" text-anchor="middle" font-size="14" fill="#555">→</text>
  <rect x="280" y="76" width="210" height="40" fill="#E3F2FD" rx="4" stroke="#1565c0" stroke-width="1"/>
  <text x="385" y="92" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Spam Filters</text>
  <text x="385" y="108" text-anchor="middle" font-size="9" fill="#555">Auto-move unwanted emails</text>

  <!-- Row 2: Spyware -->
  <rect x="30" y="122" width="210" height="40" fill="#FFEBEE" rx="4" stroke="#c62828" stroke-width="1"/>
  <text x="135" y="138" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Spyware</text>
  <text x="135" y="154" text-anchor="middle" font-size="9" fill="#555">Secretly monitors your device</text>
  <text x="255" y="144" text-anchor="middle" font-size="14" fill="#555">→</text>
  <rect x="280" y="122" width="210" height="40" fill="#E3F2FD" rx="4" stroke="#1565c0" stroke-width="1"/>
  <text x="385" y="138" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Antivirus Software</text>
  <text x="385" y="154" text-anchor="middle" font-size="9" fill="#555">Scans and blocks harmful files</text>

  <!-- Row 3: Cookies -->
  <rect x="30" y="168" width="210" height="40" fill="#FFEBEE" rx="4" stroke="#c62828" stroke-width="1"/>
  <text x="135" y="184" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Cookies</text>
  <text x="135" y="200" text-anchor="middle" font-size="9" fill="#555">Tracks your online activity</text>
  <text x="255" y="190" text-anchor="middle" font-size="14" fill="#555">→</text>
  <rect x="280" y="168" width="210" height="40" fill="#E3F2FD" rx="4" stroke="#1565c0" stroke-width="1"/>
  <text x="385" y="184" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Cookie Management</text>
  <text x="385" y="200" text-anchor="middle" font-size="9" fill="#555">Keep trusted, delete unknown</text>

  <!-- Row 4: Phishing -->
  <rect x="30" y="214" width="210" height="40" fill="#FFEBEE" rx="4" stroke="#c62828" stroke-width="1"/>
  <text x="135" y="230" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Phishing</text>
  <text x="135" y="246" text-anchor="middle" font-size="9" fill="#555">Fake emails stealing your info</text>
  <text x="255" y="236" text-anchor="middle" font-size="14" fill="#555">→</text>
  <rect x="280" y="214" width="210" height="40" fill="#E3F2FD" rx="4" stroke="#1565c0" stroke-width="1"/>
  <text x="385" y="230" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Recognize Phishing</text>
  <text x="385" y="246" text-anchor="middle" font-size="9" fill="#555">Verify source before clicking</text>

  <!-- Row 5: Pharming -->
  <rect x="30" y="260" width="210" height="40" fill="#FFEBEE" rx="4" stroke="#c62828" stroke-width="1"/>
  <text x="135" y="276" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Pharming</text>
  <text x="135" y="292" text-anchor="middle" font-size="9" fill="#555">Redirects to fake websites</text>
  <text x="255" y="282" text-anchor="middle" font-size="14" fill="#555">→</text>
  <rect x="280" y="260" width="210" height="40" fill="#E3F2FD" rx="4" stroke="#1565c0" stroke-width="1"/>
  <text x="385" y="276" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Check https:// + Padlock</text>
  <text x="385" y="292" text-anchor="middle" font-size="9" fill="#555">Verify URL before logging in</text>
</svg>
