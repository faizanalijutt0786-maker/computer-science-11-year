<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" font-family="Arial, sans-serif">
  <rect width="520" height="320" fill="#f8faff" rx="12"/>
  <text x="260" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 7.3: The Digital Divide — Causes and Impacts</text>

  <!-- Left side: Causes -->
  <rect x="20" y="42" width="155" height="26" fill="#1565c0" rx="5"/>
  <text x="97" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">CAUSES</text>

  <rect x="20" y="76" width="155" height="44" fill="#E3F2FD" rx="5" stroke="#1565c0" stroke-width="1"/>
  <text x="97" y="94" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">Economic Barriers</text>
  <text x="97" y="110" text-anchor="middle" font-size="9" fill="#555">Can't afford devices/internet</text>

  <rect x="20" y="126" width="155" height="44" fill="#E3F2FD" rx="5" stroke="#1565c0" stroke-width="1"/>
  <text x="97" y="144" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">Geographical Barriers</text>
  <text x="97" y="160" text-anchor="middle" font-size="9" fill="#555">No infrastructure in rural areas</text>

  <rect x="20" y="176" width="155" height="44" fill="#E3F2FD" rx="5" stroke="#1565c0" stroke-width="1"/>
  <text x="97" y="194" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">Educational Barriers</text>
  <text x="97" y="210" text-anchor="middle" font-size="9" fill="#555">Lack of digital literacy</text>

  <rect x="20" y="226" width="155" height="44" fill="#E3F2FD" rx="5" stroke="#1565c0" stroke-width="1"/>
  <text x="97" y="244" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">Social Barriers</text>
  <text x="97" y="260" text-anchor="middle" font-size="9" fill="#555">Age, gender, disability</text>

  <!-- Center: Digital Divide arrow -->
  <rect x="190" y="130" width="140" height="60" fill="#1565c0" rx="10"/>
  <text x="260" y="155" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Digital</text>
  <text x="260" y="172" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Divide</text>
  <line x1="175" y1="160" x2="188" y2="160" stroke="#1565c0" stroke-width="2"/>
  <line x1="332" y1="160" x2="345" y2="160" stroke="#c62828" stroke-width="2"/>

  <!-- Right side: Impacts -->
  <rect x="345" y="42" width="155" height="26" fill="#c62828" rx="5"/>
  <text x="422" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">IMPACTS</text>

  <rect x="345" y="76" width="155" height="44" fill="#FFEBEE" rx="5" stroke="#c62828" stroke-width="1"/>
  <text x="422" y="94" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Educational Inequality</text>
  <text x="422" y="110" text-anchor="middle" font-size="9" fill="#555">Unequal learning opportunities</text>

  <rect x="345" y="126" width="155" height="44" fill="#FFEBEE" rx="5" stroke="#c62828" stroke-width="1"/>
  <text x="422" y="144" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Economic Disparities</text>
  <text x="422" y="160" text-anchor="middle" font-size="9" fill="#555">Fewer job opportunities</text>

  <rect x="345" y="176" width="155" height="44" fill="#FFEBEE" rx="5" stroke="#c62828" stroke-width="1"/>
  <text x="422" y="194" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Social Exclusion</text>
  <text x="422" y="210" text-anchor="middle" font-size="9" fill="#555">Limited civic participation</text>

  <rect x="345" y="226" width="155" height="44" fill="#FFEBEE" rx="5" stroke="#c62828" stroke-width="1"/>
  <text x="422" y="244" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">Health Disparities</text>
  <text x="422" y="260" text-anchor="middle" font-size="9" fill="#555">Limited telemedicine access</text>

  <!-- Solution banner at bottom -->
  <rect x="80" y="284" width="360" height="26" fill="#2e7d32" rx="6"/>
  <text x="260" y="301" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Solution: Government initiatives · Education programs · Public-Private partnerships</text>
</svg>
