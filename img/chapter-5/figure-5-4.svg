<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360" font-family="Arial, sans-serif">
  <rect width="480" height="360" fill="#f8faff" rx="12"/>
  <text x="240" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 5.4: Scatterplot — Hours Studied vs Exam Score</text>

  <!-- Axes -->
  <line x1="70" y1="290" x2="440" y2="290" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="290" stroke="#333" stroke-width="2"/>

  <!-- Grid -->
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="70" y1="50"  x2="440" y2="50"/>
    <line x1="70" y1="98"  x2="440" y2="98"/>
    <line x1="70" y1="146" x2="440" y2="146"/>
    <line x1="70" y1="194" x2="440" y2="194"/>
    <line x1="70" y1="242" x2="440" y2="242"/>
    <line x1="150" y1="50" x2="150" y2="290"/>
    <line x1="230" y1="50" x2="230" y2="290"/>
    <line x1="310" y1="50" x2="310" y2="290"/>
    <line x1="390" y1="50" x2="390" y2="290"/>
  </g>

  <!-- Y labels (score 0-100, 240px range → 2.4px per unit) -->
  <text x="60" y="294" text-anchor="end" font-size="11" fill="#555">0</text>
  <text x="60" y="246" text-anchor="end" font-size="11" fill="#555">20</text>
  <text x="60" y="198" text-anchor="end" font-size="11" fill="#555">40</text>
  <text x="60" y="150" text-anchor="end" font-size="11" fill="#555">60</text>
  <text x="60" y="102" text-anchor="end" font-size="11" fill="#555">80</text>
  <text x="60" y="54"  text-anchor="end" font-size="11" fill="#555">100</text>

  <!-- X labels (hours 0-10, 370px range → 37px per unit) -->
  <text x="70"  y="308" text-anchor="middle" font-size="11" fill="#555">0</text>
  <text x="150" y="308" text-anchor="middle" font-size="11" fill="#555">2</text>
  <text x="230" y="308" text-anchor="middle" font-size="11" fill="#555">4</text>
  <text x="310" y="308" text-anchor="middle" font-size="11" fill="#555">6</text>
  <text x="390" y="308" text-anchor="middle" font-size="11" fill="#555">8</text>
  <text x="440" y="308" text-anchor="middle" font-size="11" fill="#555">10</text>

  <!-- Trend line -->
  <line x1="80" y1="270" x2="430" y2="70" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Data points (hours, score) → x=70+hours*37, y=290-score*2.4 -->
  <!-- (1,35) (2,45) (2,50) (3,55) (4,60) (4,65) (5,65) (5,70) (6,72) (6,78) (7,80) (7,85) (8,88) (9,90) (10,95) -->
  <g fill="#1565c0" stroke="white" stroke-width="1">
    <circle cx="107" cy="206" r="5"/>
    <circle cx="144" cy="182" r="5"/>
    <circle cx="144" cy="170" r="5"/>
    <circle cx="181" cy="158" r="5"/>
    <circle cx="218" cy="146" r="5"/>
    <circle cx="218" cy="134" r="5"/>
    <circle cx="255" cy="134" r="5"/>
    <circle cx="255" cy="122" r="5"/>
    <circle cx="292" cy="117" r="5"/>
    <circle cx="292" cy="103" r="5"/>
    <circle cx="329" cy="98"  r="5"/>
    <circle cx="329" cy="86"  r="5"/>
    <circle cx="366" cy="78"  r="5"/>
    <circle cx="403" cy="74"  r="5"/>
    <circle cx="440" cy="62"  r="5"/>
  </g>

  <!-- Axis labels -->
  <text x="255" y="332" text-anchor="middle" font-size="12" fill="#555">Hours Studied</text>
  <text x="20" y="170" font-size="12" fill="#555" transform="rotate(-90 20 170)">Exam Score</text>

  <!-- Legend -->
  <circle cx="90" cy="345" r="5" fill="#1565c0"/>
  <text x="100" y="349" font-size="11" fill="#333">Student data point</text>
  <line x1="200" y1="345" x2="240" y2="345" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="248" y="349" font-size="11" fill="#333">Trend line (positive correlation)</text>
</svg>
