<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" font-family="Arial, sans-serif">
  <rect width="520" height="300" fill="#f8faff" rx="12"/>
  <text x="260" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 9.4: Collaboration and Iteration Cycle</text>

  <!-- Circular flow with 4 stages -->
  <!-- Stage 1: Create/Build (top) -->
  <rect x="175" y="45" width="150" height="50" fill="#1565c0" rx="8"/>
  <text x="250" y="66" text-anchor="middle" font-size="11" fill="white" font-weight="bold">1. Create / Build</text>
  <text x="250" y="82" text-anchor="middle" font-size="9" fill="#BBDEFB">Collaborate to produce first version</text>

  <!-- Arrow top → right -->
  <path d="M 340 70 Q 420 70 420 130" stroke="#1565c0" stroke-width="2" fill="none"/>
  <polygon points="420,130 414,120 426,120" fill="#1565c0"/>

  <!-- Stage 2: Share/Review (right) -->
  <rect x="370" y="128" width="140" height="50" fill="#1976D2" rx="8"/>
  <text x="440" y="149" text-anchor="middle" font-size="11" fill="white" font-weight="bold">2. Share &amp; Review</text>
  <text x="440" y="165" text-anchor="middle" font-size="9" fill="#BBDEFB">Gather feedback from others</text>

  <!-- Arrow right → bottom -->
  <path d="M 420 178 Q 420 240 340 240" stroke="#1976D2" stroke-width="2" fill="none"/>
  <polygon points="340,240 350,234 350,246" fill="#1976D2"/>

  <!-- Stage 3: Improve/Iterate (bottom) -->
  <rect x="175" y="218" width="150" height="50" fill="#42A5F5" rx="8"/>
  <text x="250" y="239" text-anchor="middle" font-size="11" fill="white" font-weight="bold">3. Improve / Iterate</text>
  <text x="250" y="255" text-anchor="middle" font-size="9" fill="#E3F2FD">Refine based on feedback</text>

  <!-- Arrow bottom → left -->
  <path d="M 175 243 Q 100 243 100 178" stroke="#42A5F5" stroke-width="2" fill="none"/>
  <polygon points="100,178 94,188 106,188" fill="#42A5F5"/>

  <!-- Stage 4: Test (left) -->
  <rect x="10" y="128" width="140" height="50" fill="#1976D2" rx="8"/>
  <text x="80" y="149" text-anchor="middle" font-size="11" fill="white" font-weight="bold">4. Test Again</text>
  <text x="80" y="165" text-anchor="middle" font-size="9" fill="#BBDEFB">Validate improvements</text>

  <!-- Arrow left → top -->
  <path d="M 100 128 Q 100 70 175 70" stroke="#1976D2" stroke-width="2" fill="none"/>
  <polygon points="175,70 165,64 165,76" fill="#1976D2"/>

  <!-- Center text -->
  <text x="250" y="148" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">Continuous</text>
  <text x="250" y="164" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">Improvement</text>

  <!-- Labels -->
  <text x="250" y="285" text-anchor="middle" font-size="10" fill="#555">Each cycle produces a better result through collaboration and iteration</text>
</svg>
