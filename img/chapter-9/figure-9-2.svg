<svg xmlns="http://www.w3.org/2000/svg" width="520" height="340" viewBox="0 0 520 340" font-family="Arial, sans-serif">
  <rect width="520" height="340" fill="#f8faff" rx="12"/>
  <text x="260" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 9.2: Key Parts of a Business Plan</text>

  <!-- Center -->
  <circle cx="260" cy="178" r="46" fill="#1565c0" stroke="white" stroke-width="3"/>
  <text x="260" y="172" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Business</text>
  <text x="260" y="186" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Plan</text>

  <!-- 6 sections around the center -->
  <!-- Top -->
  <line x1="260" y1="132" x2="260" y2="92" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="170" y="55" width="180" height="36" fill="#1565c0" rx="7"/>
  <text x="260" y="70" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Executive Summary</text>
  <text x="260" y="84" text-anchor="middle" font-size="9" fill="#BBDEFB">Brief overview of your idea &amp; goals</text>

  <!-- Top-right -->
  <line x1="298" y1="148" x2="343" y2="114" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="338" y="80" width="170" height="36" fill="#1976D2" rx="7"/>
  <text x="423" y="95" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Business Description</text>
  <text x="423" y="109" text-anchor="middle" font-size="9" fill="#BBDEFB">Products, customers, uniqueness</text>

  <!-- Bottom-right -->
  <line x1="302" y1="206" x2="343" y2="238" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="338" y="232" width="170" height="36" fill="#1976D2" rx="7"/>
  <text x="423" y="247" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Market Analysis</text>
  <text x="423" y="261" text-anchor="middle" font-size="9" fill="#BBDEFB">Customers, competitors, market size</text>

  <!-- Bottom -->
  <line x1="260" y1="224" x2="260" y2="264" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="165" y="264" width="190" height="36" fill="#1565c0" rx="7"/>
  <text x="260" y="279" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Financial Plan</text>
  <text x="260" y="293" text-anchor="middle" font-size="9" fill="#BBDEFB">Budget, funding, expected revenue</text>

  <!-- Bottom-left -->
  <line x1="218" y1="206" x2="177" y2="238" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="12" y="232" width="173" height="36" fill="#1976D2" rx="7"/>
  <text x="98" y="247" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Marketing &amp; Sales</text>
  <text x="98" y="261" text-anchor="middle" font-size="9" fill="#BBDEFB">Attract and retain customers</text>

  <!-- Top-left -->
  <line x1="222" y1="148" x2="177" y2="114" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="12" y="80" width="173" height="36" fill="#1976D2" rx="7"/>
  <text x="98" y="95" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Products or Services</text>
  <text x="98" y="109" text-anchor="middle" font-size="9" fill="#BBDEFB">Features &amp; benefits you offer</text>

  <text x="260" y="325" text-anchor="middle" font-size="10" fill="#555">A complete business plan covers all six sections</text>
</svg>
