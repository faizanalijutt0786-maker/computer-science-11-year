<svg xmlns="http://www.w3.org/2000/svg" width="540" height="300" viewBox="0 0 540 300" font-family="Arial, sans-serif">
  <rect width="540" height="300" fill="#f8faff" rx="12"/>
  <text x="270" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 9.1: The Five Steps of Design Thinking</text>

  <!-- 5 steps as connected boxes with arrows -->
  <!-- Step widths: 88px each, gap: 10px, total: 5*88 + 4*10 = 480, start x=30 -->

  <!-- Step 1: Empathize -->
  <rect x="30" y="60" width="88" height="180" fill="#1565c0" rx="8"/>
  <text x="74" y="112" text-anchor="middle" font-size="22" fill="white">1</text>
  <text x="74" y="138" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Empathize</text>
  <text x="74" y="156" text-anchor="middle" font-size="9" fill="#BBDEFB">Understand</text>
  <text x="74" y="169" text-anchor="middle" font-size="9" fill="#BBDEFB">users' needs</text>
  <text x="74" y="182" text-anchor="middle" font-size="9" fill="#BBDEFB">&amp; feelings</text>
  <polygon points="118,150 128,142 128,158" fill="#1565c0"/>

  <!-- Step 2: Define -->
  <rect x="128" y="60" width="88" height="180" fill="#1976D2" rx="8"/>
  <text x="172" y="112" text-anchor="middle" font-size="22" fill="white">2</text>
  <text x="172" y="138" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Define</text>
  <text x="172" y="156" text-anchor="middle" font-size="9" fill="#BBDEFB">Clearly state</text>
  <text x="172" y="169" text-anchor="middle" font-size="9" fill="#BBDEFB">the problem</text>
  <text x="172" y="182" text-anchor="middle" font-size="9" fill="#BBDEFB">to solve</text>
  <polygon points="216,150 226,142 226,158" fill="#1976D2"/>

  <!-- Step 3: Ideate -->
  <rect x="226" y="60" width="88" height="180" fill="#42A5F5" rx="8"/>
  <text x="270" y="112" text-anchor="middle" font-size="22" fill="white">3</text>
  <text x="270" y="138" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Ideate</text>
  <text x="270" y="156" text-anchor="middle" font-size="9" fill="#E3F2FD">Brainstorm</text>
  <text x="270" y="169" text-anchor="middle" font-size="9" fill="#E3F2FD">many possible</text>
  <text x="270" y="182" text-anchor="middle" font-size="9" fill="#E3F2FD">solutions</text>
  <polygon points="314,150 324,142 324,158" fill="#42A5F5"/>

  <!-- Step 4: Prototype -->
  <rect x="324" y="60" width="88" height="180" fill="#1976D2" rx="8"/>
  <text x="368" y="112" text-anchor="middle" font-size="22" fill="white">4</text>
  <text x="368" y="138" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Prototype</text>
  <text x="368" y="156" text-anchor="middle" font-size="9" fill="#BBDEFB">Build a quick</text>
  <text x="368" y="169" text-anchor="middle" font-size="9" fill="#BBDEFB">simple version</text>
  <text x="368" y="182" text-anchor="middle" font-size="9" fill="#BBDEFB">of the idea</text>
  <polygon points="412,150 422,142 422,158" fill="#1976D2"/>

  <!-- Step 5: Test -->
  <rect x="422" y="60" width="88" height="180" fill="#1565c0" rx="8"/>
  <text x="466" y="112" text-anchor="middle" font-size="22" fill="white">5</text>
  <text x="466" y="138" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Test</text>
  <text x="466" y="156" text-anchor="middle" font-size="9" fill="#BBDEFB">Try it with</text>
  <text x="466" y="169" text-anchor="middle" font-size="9" fill="#BBDEFB">users, gather</text>
  <text x="466" y="182" text-anchor="middle" font-size="9" fill="#BBDEFB">feedback</text>

  <!-- Feedback loop arrow at bottom -->
  <path d="M 466 248 Q 270 282 74 248" stroke="#FF9800" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <polygon points="74,248 64,244 68,254" fill="#FF9800"/>
  <text x="270" y="278" text-anchor="middle" font-size="10" fill="#FF9800">Iterate based on feedback</text>
</svg>
