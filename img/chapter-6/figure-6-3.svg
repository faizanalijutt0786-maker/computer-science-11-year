<svg xmlns="http://www.w3.org/2000/svg" width="540" height="300" viewBox="0 0 540 300" font-family="Arial, sans-serif">
  <rect width="540" height="300" fill="#f8faff" rx="12"/>
  <text x="270" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 6.3: Supply Chain Tracking Using Blockchain</text>

  <!-- Entities: Supplier → Manufacturer → Fabricator → Intermediary → Retailer → Customer -->
  <!-- Y positions: top row y=90, bottom row y=200 -->
  <!-- Top row: Supplier(80), Manufacturer(220), Customer(460) -->
  <!-- Bottom row: Fabricator(150), Intermediary(300), Retailer(430) -->

  <!-- Blockchain ledger bar -->
  <rect x="30" y="135" width="480" height="28" fill="#1565c0" rx="6" opacity="0.85"/>
  <text x="270" y="153" text-anchor="middle" font-size="10" fill="white" font-weight="bold">BLOCKCHAIN LEDGER — Every transaction recorded, transparent &amp; immutable</text>

  <!-- Arrows on ledger -->
  <g stroke="#42A5F5" stroke-width="1.5" fill="none">
    <line x1="130" y1="149" x2="160" y2="149"/>
    <line x1="210" y1="149" x2="240" y2="149"/>
    <line x1="290" y1="149" x2="320" y2="149"/>
    <line x1="370" y1="149" x2="400" y2="149"/>
    <line x1="450" y1="149" x2="480" y2="149"/>
  </g>

  <!-- Supplier -->
  <circle cx="75" cy="90" r="32" fill="#1565c0" stroke="white" stroke-width="2"/>
  <text x="75" y="86" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Raw</text>
  <text x="75" y="98" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Supplier</text>
  <line x1="75" y1="122" x2="75" y2="135" stroke="#1565c0" stroke-width="1.5"/>

  <!-- Manufacturer -->
  <circle cx="200" cy="90" r="32" fill="#1976D2" stroke="white" stroke-width="2"/>
  <text x="200" y="86" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Manufac-</text>
  <text x="200" y="98" text-anchor="middle" font-size="9" fill="white" font-weight="bold">turer</text>
  <line x1="200" y1="122" x2="200" y2="135" stroke="#1976D2" stroke-width="1.5"/>

  <!-- Fabricator -->
  <circle cx="160" cy="210" r="32" fill="#42A5F5" stroke="white" stroke-width="2"/>
  <text x="160" y="206" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Fabri-</text>
  <text x="160" y="218" text-anchor="middle" font-size="9" fill="white" font-weight="bold">cator</text>
  <line x1="160" y1="163" x2="160" y2="178" stroke="#42A5F5" stroke-width="1.5"/>

  <!-- Intermediary -->
  <circle cx="310" cy="210" r="32" fill="#42A5F5" stroke="white" stroke-width="2"/>
  <text x="310" y="206" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Inter-</text>
  <text x="310" y="218" text-anchor="middle" font-size="9" fill="white" font-weight="bold">mediary</text>
  <line x1="310" y1="163" x2="310" y2="178" stroke="#42A5F5" stroke-width="1.5"/>

  <!-- Retailer -->
  <circle cx="420" cy="210" r="32" fill="#1976D2" stroke="white" stroke-width="2"/>
  <text x="420" y="210" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Retailer</text>
  <line x1="420" y1="163" x2="420" y2="178" stroke="#1976D2" stroke-width="1.5"/>

  <!-- Customer -->
  <circle cx="465" cy="90" r="32" fill="#1565c0" stroke="white" stroke-width="2"/>
  <text x="465" y="86" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Customer</text>
  <text x="465" y="98" text-anchor="middle" font-size="9" fill="white" font-weight="bold">(End User)</text>
  <line x1="465" y1="122" x2="465" y2="135" stroke="#1565c0" stroke-width="1.5"/>

  <!-- Legend -->
  <circle cx="80" cy="272" r="8" fill="#1565c0"/>
  <text x="94" y="276" font-size="10" fill="#333">Supply chain participant</text>
  <rect x="230" y="265" width="40" height="12" fill="#1565c0" rx="3" opacity="0.85"/>
  <text x="276" y="275" font-size="10" fill="#333">Blockchain ledger layer</text>

  <text x="270" y="295" text-anchor="middle" font-size="10" fill="#555">Every step is securely logged — product journey is fully traceable</text>
</svg>
