<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360" font-family="Arial, sans-serif">
  <rect width="480" height="360" fill="#f8faff" rx="12"/>
  <text x="240" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 5.3: Histogram — Distribution of Exam Scores</text>

  <!-- Axes -->
  <line x1="70" y1="290" x2="440" y2="290" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="290" stroke="#333" stroke-width="2"/>

  <!-- Grid -->
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="70" y1="240" x2="440" y2="240"/>
    <line x1="70" y1="190" x2="440" y2="190"/>
    <line x1="70" y1="140" x2="440" y2="140"/>
    <line x1="70" y1="90" x2="440" y2="90"/>
  </g>

  <!-- Y labels (frequency) -->
  <text x="60" y="294" text-anchor="end" font-size="11" fill="#555">0</text>
  <text x="60" y="244" text-anchor="end" font-size="11" fill="#555">2</text>
  <text x="60" y="194" text-anchor="end" font-size="11" fill="#555">4</text>
  <text x="60" y="144" text-anchor="end" font-size="11" fill="#555">6</text>
  <text x="60" y="94" text-anchor="end" font-size="11" fill="#555">8</text>

  <!-- Bars: frequency * 25px per unit, no gap (histogram) -->
  <!-- Bins: 50-55:1, 56-60:2, 61-65:4, 66-70:8, 71-75:7, 76-80:5, 81-85:3, 86-90:2, 91-95:1, 96-100:1 -->
  <!-- bar width = 370/10 = 37px -->
  <g fill="#1976D2" stroke="#1565c0" stroke-width="1">
    <rect x="70"  y="265" width="37" height="25"/>  <!-- 1 -->
    <rect x="107" y="240" width="37" height="50"/>  <!-- 2 -->
    <rect x="144" y="190" width="37" height="100"/> <!-- 4 -->
    <rect x="181" y="90"  width="37" height="200"/> <!-- 8 -->
    <rect x="218" y="115" width="37" height="175"/> <!-- 7 -->
    <rect x="255" y="165" width="37" height="125"/> <!-- 5 -->
    <rect x="292" y="215" width="37" height="75"/>  <!-- 3 -->
    <rect x="329" y="240" width="37" height="50"/>  <!-- 2 -->
    <rect x="366" y="265" width="37" height="25"/>  <!-- 1 -->
    <rect x="403" y="265" width="37" height="25"/>  <!-- 1 -->
  </g>

  <!-- Frequency labels on bars -->
  <g font-size="10" fill="white" text-anchor="middle" font-weight="bold">
    <text x="88"  y="280">1</text>
    <text x="125" y="255">2</text>
    <text x="162" y="205">4</text>
    <text x="199" y="105">8</text>
    <text x="236" y="130">7</text>
    <text x="273" y="180">5</text>
    <text x="310" y="230">3</text>
    <text x="347" y="255">2</text>
    <text x="384" y="280">1</text>
    <text x="421" y="280">1</text>
  </g>

  <!-- X-axis bin labels -->
  <g font-size="9" fill="#555" text-anchor="middle">
    <text x="88"  y="308">50-55</text>
    <text x="125" y="308">56-60</text>
    <text x="162" y="308">61-65</text>
    <text x="199" y="308">66-70</text>
    <text x="236" y="308">71-75</text>
    <text x="273" y="308">76-80</text>
    <text x="310" y="308">81-85</text>
    <text x="347" y="308">86-90</text>
    <text x="384" y="308">91-95</text>
    <text x="421" y="308">96-100</text>
  </g>

  <!-- Axis labels -->
  <text x="255" y="330" text-anchor="middle" font-size="12" fill="#555">Exam Score Range</text>
  <text x="20" y="170" font-size="12" fill="#555" transform="rotate(-90 20 170)">Frequency</text>
</svg>
