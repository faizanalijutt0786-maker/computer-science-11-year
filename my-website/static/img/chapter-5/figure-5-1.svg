<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360" font-family="Arial, sans-serif">
  <rect width="480" height="360" fill="#f8faff" rx="12"/>
  <text x="240" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 5.1: Bar Chart — Monthly Product Sales</text>

  <!-- Axes -->
  <line x1="70" y1="290" x2="440" y2="290" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="290" stroke="#333" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="60" y="294" text-anchor="end" font-size="11" fill="#555">0</text>
  <text x="60" y="244" text-anchor="end" font-size="11" fill="#555">200</text>
  <text x="60" y="194" text-anchor="end" font-size="11" fill="#555">400</text>
  <text x="60" y="144" text-anchor="end" font-size="11" fill="#555">600</text>
  <text x="60" y="94" text-anchor="end" font-size="11" fill="#555">800</text>
  <text x="60" y="54" text-anchor="end" font-size="11" fill="#555">1000</text>

  <!-- Y-axis grid lines -->
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="70" y1="240" x2="440" y2="240"/>
    <line x1="70" y1="190" x2="440" y2="190"/>
    <line x1="70" y1="140" x2="440" y2="140"/>
    <line x1="70" y1="90" x2="440" y2="90"/>
    <line x1="70" y1="50" x2="440" y2="50"/>
  </g>

  <!-- Bars: each unit = 0.24px (1000 units = 240px height) -->
  <!-- Product 1: 850 → height=204 -->
  <rect x="90" y="86" width="55" height="204" fill="#1565c0" rx="4"/>
  <text x="117" y="80" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">850</text>
  <text x="117" y="308" text-anchor="middle" font-size="11" fill="#333">Product 1</text>

  <!-- Product 2: 620 → height=148.8 -->
  <rect x="175" y="141" width="55" height="149" fill="#1976D2" rx="4"/>
  <text x="202" y="135" text-anchor="middle" font-size="11" fill="#1976D2" font-weight="bold">620</text>
  <text x="202" y="308" text-anchor="middle" font-size="11" fill="#333">Product 2</text>

  <!-- Product 3: 980 → height=235 -->
  <rect x="260" y="55" width="55" height="235" fill="#42A5F5" rx="4"/>
  <text x="287" y="49" text-anchor="middle" font-size="11" fill="#42A5F5" font-weight="bold">980</text>
  <text x="287" y="308" text-anchor="middle" font-size="11" fill="#333">Product 3</text>

  <!-- Product 4: 430 → height=103 -->
  <rect x="345" y="187" width="55" height="103" fill="#90CAF9" rx="4"/>
  <text x="372" y="181" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">430</text>
  <text x="372" y="308" text-anchor="middle" font-size="11" fill="#333">Product 4</text>

  <!-- Axis labels -->
  <text x="255" y="330" text-anchor="middle" font-size="12" fill="#555">Products</text>
  <text x="20" y="170" font-size="12" fill="#555" transform="rotate(-90 20 170)">Sales (Units)</text>
</svg>
