<svg xmlns="http://www.w3.org/2000/svg" width="500" height="420" viewBox="0 0 500 420" font-family="Arial, sans-serif">
  <rect width="500" height="420" fill="#f8faff" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 3.7: Binary Search — Search Interval Halved Each Step</text>
  <text x="250" y="46" text-anchor="middle" font-size="11" fill="#555">Target: 7   |   List: [1, 3, 5, 7, 9, 11, 13]</text>

  <defs>
    <marker id="arr7" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 1: full array -->
  <text x="30" y="85" font-size="12" fill="#333" font-weight="bold">Step 1:</text>
  <text x="30" y="100" font-size="11" fill="#555">Low=0, High=6, Mid=3 → arr[3]=7</text>
  <!-- cells -->
  <g font-size="14" text-anchor="middle">
    <!-- indices -->
    <text x="85" y="130" fill="#888" font-size="10">0</text>
    <text x="135" y="130" fill="#888" font-size="10">1</text>
    <text x="185" y="130" fill="#888" font-size="10">2</text>
    <text x="235" y="130" fill="#888" font-size="10">3</text>
    <text x="285" y="130" fill="#888" font-size="10">4</text>
    <text x="335" y="130" fill="#888" font-size="10">5</text>
    <text x="385" y="130" fill="#888" font-size="10">6</text>

    <rect x="60" y="135" width="50" height="36" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" rx="4"/>
    <text x="85" y="159">1</text>
    <rect x="110" y="135" width="50" height="36" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" rx="4"/>
    <text x="135" y="159">3</text>
    <rect x="160" y="135" width="50" height="36" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" rx="4"/>
    <text x="185" y="159">5</text>
    <!-- MID cell highlighted -->
    <rect x="210" y="135" width="50" height="36" fill="#4CAF50" stroke="#2e7d32" stroke-width="2" rx="4"/>
    <text x="235" y="159" fill="white" font-weight="bold">7</text>
    <rect x="260" y="135" width="50" height="36" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" rx="4"/>
    <text x="285" y="159">9</text>
    <rect x="310" y="135" width="50" height="36" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" rx="4"/>
    <text x="335" y="159">11</text>
    <rect x="360" y="135" width="50" height="36" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" rx="4"/>
    <text x="385" y="159">13</text>
  </g>
  <!-- MID label -->
  <text x="235" y="188" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">MID = 7 ✓</text>
  <line x1="235" y1="171" x2="235" y2="180" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr7)"/>

  <!-- FOUND -->
  <rect x="120" y="210" width="260" height="50" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">TARGET FOUND!</text>
  <text x="250" y="252" text-anchor="middle" font-size="12" fill="#2e7d32">arr[3] = 7 — found in Step 1</text>

  <!-- O(log n) explanation -->
  <rect x="60" y="285" width="380" height="90" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="250" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Why O(log n)?</text>
  <text x="80" y="328" font-size="11" fill="#555">Each step eliminates half the remaining elements.</text>
  <text x="80" y="346" font-size="11" fill="#555">For 7 elements → max 3 steps  (2³ = 8 &gt; 7)</text>
  <text x="80" y="364" font-size="11" fill="#555">For 1,000,000 elements → max 20 steps  (2²⁰ &gt; 10⁶)</text>

  <!-- comparison -->
  <text x="60" y="398" font-size="11" fill="#888">Linear Search: up to 7 comparisons | Binary Search: 1 comparison here</text>
</svg>
