<svg xmlns="http://www.w3.org/2000/svg" width="500" height="440" viewBox="0 0 500 440" font-family="Arial, sans-serif">
  <rect width="500" height="440" fill="#f8faff" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 3.6: Merge Sort — Divide and Conquer</text>
  <defs>
    <marker id="arr6" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Level 0: full array -->
  <rect x="175" y="45" width="150" height="36" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="250" y="68" text-anchor="middle" font-size="13" fill="white" font-weight="bold">[5, 3, 8, 4, 2, 1]</text>

  <!-- DIVIDE label -->
  <text x="20" y="140" font-size="12" fill="#e65100" font-weight="bold">DIVIDE</text>
  <line x1="20" y1="148" x2="20" y2="280" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 1: two halves -->
  <line x1="220" y1="81" x2="145" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="280" y1="81" x2="355" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>

  <rect x="70" y="120" width="130" height="36" rx="6" fill="#1976D2" stroke="#1565c0" stroke-width="2"/>
  <text x="135" y="143" text-anchor="middle" font-size="13" fill="white">[5, 3, 8]</text>

  <rect x="300" y="120" width="130" height="36" rx="6" fill="#1976D2" stroke="#1565c0" stroke-width="2"/>
  <text x="365" y="143" text-anchor="middle" font-size="13" fill="white">[4, 2, 1]</text>

  <!-- Level 2: single/pair elements -->
  <line x1="110" y1="156" x2="75" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="160" y1="156" x2="195" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="340" y1="156" x2="305" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="390" y1="156" x2="425" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>

  <rect x="40" y="196" width="70" height="32" rx="5" fill="#42A5F5" stroke="#1976D2" stroke-width="1.5"/>
  <text x="75" y="217" text-anchor="middle" font-size="12" fill="white">[5]  [3]</text>

  <rect x="165" y="196" width="60" height="32" rx="5" fill="#42A5F5" stroke="#1976D2" stroke-width="1.5"/>
  <text x="195" y="217" text-anchor="middle" font-size="12" fill="white">[8]</text>

  <rect x="270" y="196" width="60" height="32" rx="5" fill="#42A5F5" stroke="#1976D2" stroke-width="1.5"/>
  <text x="300" y="217" text-anchor="middle" font-size="12" fill="white">[4]</text>

  <rect x="390" y="196" width="70" height="32" rx="5" fill="#42A5F5" stroke="#1976D2" stroke-width="1.5"/>
  <text x="425" y="217" text-anchor="middle" font-size="12" fill="white">[2]  [1]</text>

  <!-- MERGE label -->
  <text x="20" y="295" font-size="12" fill="#2e7d32" font-weight="bold">MERGE</text>
  <line x1="20" y1="303" x2="20" y2="400" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level merge 1 -->
  <line x1="75" y1="228" x2="120" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="195" y1="228" x2="150" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>

  <rect x="65" y="268" width="130" height="32" rx="5" fill="#388E3C" stroke="#2e7d32" stroke-width="2"/>
  <text x="130" y="289" text-anchor="middle" font-size="12" fill="white">[3, 5, 8]</text>

  <line x1="300" y1="228" x2="340" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="425" y1="228" x2="390" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>

  <rect x="300" y="268" width="130" height="32" rx="5" fill="#388E3C" stroke="#2e7d32" stroke-width="2"/>
  <text x="365" y="289" text-anchor="middle" font-size="12" fill="white">[1, 2, 4]</text>

  <!-- Final merge -->
  <line x1="130" y1="300" x2="210" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>
  <line x1="365" y1="300" x2="290" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arr6)"/>

  <rect x="130" y="360" width="240" height="36" rx="6" fill="#1B5E20" stroke="#2e7d32" stroke-width="2"/>
  <text x="250" y="383" text-anchor="middle" font-size="13" fill="white" font-weight="bold">[1, 2, 3, 4, 5, 8] ✓</text>
</svg>
