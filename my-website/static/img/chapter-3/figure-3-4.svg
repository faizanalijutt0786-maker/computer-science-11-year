<svg xmlns="http://www.w3.org/2000/svg" width="480" height="420" viewBox="0 0 480 420" font-family="Arial, sans-serif">
  <rect width="480" height="420" fill="#f8faff" rx="12"/>
  <text x="240" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Figure 3.4: Complexity Classes — P, NP, NP-Hard, NP-Complete</text>

  <!-- NP-Hard outer rectangle -->
  <rect x="20" y="50" width="440" height="310" rx="16" fill="#FFEBEE" stroke="#f44336" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="50" y="80" font-size="13" font-weight="bold" fill="#c62828">NP-Hard</text>
  <text x="50" y="96" font-size="10" fill="#c62828">(Problems at least as hard as NP)</text>

  <!-- NP ellipse -->
  <ellipse cx="270" cy="210" rx="160" ry="130" fill="#E3F2FD" stroke="#1976D2" stroke-width="2.5"/>
  <text x="390" y="110" font-size="13" font-weight="bold" fill="#1565c0">NP</text>
  <text x="360" y="126" font-size="10" fill="#1565c0">(Verifiable in</text>
  <text x="360" y="140" font-size="10" fill="#1565c0">polynomial time)</text>

  <!-- NP-Complete zone label -->
  <text x="220" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B1FA2">NP-Complete</text>
  <text x="220" y="190" text-anchor="middle" font-size="10" fill="#7B1FA2">(Intersection of NP</text>
  <text x="220" y="203" text-anchor="middle" font-size="10" fill="#7B1FA2">and NP-Hard)</text>

  <!-- P ellipse -->
  <ellipse cx="290" cy="230" rx="80" ry="60" fill="#E8F5E9" stroke="#388E3C" stroke-width="2.5"/>
  <text x="290" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">P</text>
  <text x="290" y="238" text-anchor="middle" font-size="10" fill="#2e7d32">Solvable in</text>
  <text x="290" y="252" text-anchor="middle" font-size="10" fill="#2e7d32">polynomial time</text>

  <!-- TSP label in NP-Hard only area -->
  <text x="60" y="230" font-size="11" fill="#c62828">TSP</text>
  <text x="60" y="245" font-size="10" fill="#c62828">(NP-Hard only)</text>

  <!-- Knapsack label in NP-Complete area -->
  <text x="170" y="300" font-size="11" fill="#7B1FA2">Knapsack Problem</text>
  <text x="170" y="315" font-size="10" fill="#7B1FA2">(NP-Complete)</text>

  <!-- Sorting label in P -->
  <text x="265" y="275" text-anchor="middle" font-size="10" fill="#2e7d32">Merge Sort</text>

  <!-- Legend -->
  <rect x="20" y="375" width="12" height="12" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/>
  <text x="36" y="385" font-size="11" fill="#c62828">NP-Hard</text>
  <rect x="110" y="375" width="12" height="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="126" y="385" font-size="11" fill="#1565c0">NP</text>
  <rect x="170" y="375" width="12" height="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="186" y="385" font-size="11" fill="#7B1FA2">NP-Complete</text>
  <rect x="300" y="375" width="12" height="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="316" y="385" font-size="11" fill="#2e7d32">P</text>
</svg>
